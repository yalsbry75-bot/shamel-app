name: Build Shamel APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          unzip -o shamel_final_master_production_review_FIXED.zip
          if [ -d "shamel_phase12_release" ]; then
            mv shamel_phase12_release/* .
          fi

      - name: Clean Firebase Version Constraints
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "Removing strict version constraints..."
            sed -i 's/firebase_core:.*/firebase_core: any/g' pubspec.yaml
            sed -i 's/firebase_performance:.*/firebase_performance: any/g' pubspec.yaml
            sed -i 's/firebase_crashlytics:.*/firebase_crashlytics: any/g' pubspec.yaml
            sed -i 's/firebase_messaging:.*/firebase_messaging: any/g' pubspec.yaml
            sed -i 's/firebase_auth:.*/firebase_auth: any/g' pubspec.yaml
            sed -i 's/firebase_analytics:.*/firebase_analytics: any/g' pubspec.yaml
            sed -i 's/cloud_firestore:.*/cloud_firestore: any/g' pubspec.yaml
          fi

      - name: Fix Android Gradle & Kotlin Dependencies
        run: |
          if [ -f "android/build.gradle" ]; then
            echo "Upgrading Android Gradle Plugin and Kotlin versions..."
            # تحديث إصدار الكوتلن وإصدار قرادل المتعارض مع المكتبات الحديثة
            sed -i 's/ext.kotlin_version =.*/ext.kotlin_version = "1.9.24"/g' android/build.gradle
            sed -i 's/com.android.tools.build:gradle:.*/com.android.tools.build:gradle:8.2.1/g' android/build.gradle
          fi
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            # تحديث توزيعة قرادل لتتوافق مع التحديث الجديد
            sed -i 's/gradle-.*-all.zip/gradle-8.5-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shamel-release-apk
          path: build/app/outputs/flutter-apk/app-release-apk

name: Build Flutter APK

on:
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب ملفات المستودع من جيت هاب
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. تثبيت بيئة جافا
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تثبيت بيئة فلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. فك ضغط ملف المشروع الجديد
      - name: Unzip Project Files
        run: |
          unzip -o shamel_phase12_release_FIXED.zip

      # 5. حل تعارض إصدارات الفايربيز وتحميل الحزم تلقائياً
      - name: Install Dependencies
        working-directory: shamel_phase12_release
        run: |
          flutter pub upgrade --major-versions
          flutter pub get

      # 6. بناء التطبيق واستخراج ملف الـ APK النظيف
      - name: Build APK
        working-directory: shamel_phase12_release
        run: |
          flutter build apk --release

      # 7. رفع ملف الـ APK النهائي لتتمكن من تحميله
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: shamel_phase12_release/build/app/outputs/flutter-apk/app-release.apk

name: Build Shamel APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          unzip -o shamel_final_master_production_review.zip
          if [ -d "shamel_phase12_release" ]; then
            mv shamel_phase12_release/* .
          fi

      - name: Auto-Fix AccountType Errors (All Files)
        run: |
          echo "Applying auto-fix for AccountType value/name error..."
          find . -name "*.dart" -exec sed -i "s/user\.userType?\.value/user\.userType?\.name/g" {} +

      - name: Clean Firebase Version Constraints
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "Removing strict version constraints..."
            sed -i 's/firebase_core:.*/firebase_core: any/g' pubspec.yaml
            sed -i 's/firebase_performance:.*/firebase_performance: any/g' pubspec.yaml
            sed -i 's/firebase_crashlytics:.*/firebase_crashlytics: any/g' pubspec.yaml
            sed -i 's/firebase_messaging:.*/firebase_messaging: any/g' pubspec.yaml
            sed -i 's/firebase_analytics:.*/firebase_analytics: any/g' pubspec.yaml
            sed -i 's/firebase_auth:.*/firebase_auth: any/g' pubspec.yaml
            sed -i 's/cloud_firestore:.*/cloud_firestore: any/g' pubspec.yaml
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shamel-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

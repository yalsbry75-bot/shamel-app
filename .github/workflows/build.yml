name: Build Shamel APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          unzip -o shamel_final_master_production_review.zip
          if [ -d "shamel_phase12_release" ]; then
            mv shamel_phase12_release/* .
          fi

      - name: Auto-Fix AccountType Error
        run: |
          TARGET_FILE="lib/features/auth/data/secure_session_storage.dart"
          if [ -f "$TARGET_FILE" ]; then
            echo "File found. Applying auto-fix..."
            sed -i "s/user\.userType?\.value/user\.userType?\.name/g" "$TARGET_FILE"
          else
            echo "File not found at standard path, searching..."
            find . -name "secure_session_storage.dart" -exec sed -i "s/user\.userType?\.value/user\.userType?\.name/g" {} +
          fi

      - name: Force Fix Firebase Conflict
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "Modifying pubspec.yaml to resolve Firebase conflicts..."
            # استبدال أي إصدار محدد لـ firebase_core و firebase_performance لجعلهما يقبلان أي إصدار متوافق تلقائياً
            sed -i 's/firebase_core:.*/firebase_core: any/g' pubspec.yaml
            sed -i 's/firebase_performance:.*/firebase_performance: any/g' pubspec.yaml
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shamel-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
